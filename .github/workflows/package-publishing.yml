name: Package Publishing

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
    inputs:
      environment_name:
        description: "Environment to publish to"
        required: true
        type: choice
        options:
          - dev
          - prod
      language:
        description: "Language to publish (csharp, java, php, python, ruby, typescript)"
        required: true
        type: choice
        options:
          - csharp
          - java
          - php
          - python
          - ruby
          - typescript

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      environment: ${{ steps.set-env.outputs.environment }}
      publish_version: ${{ steps.set-version.outputs.publish_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo 'matrix=["csharp","java","php","python","ruby","typescript"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.language }}"]' >> $GITHUB_OUTPUT
          fi

      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ github.event.inputs.environment_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Read and bump version
        id: set-version
        run: |
          VERSION_FILE="tests/fixtures/sdk-versions.txt"
          CURRENT=$(cat "$VERSION_FILE" | tr -d '[:space:]')
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEXT="$major.$minor.$((patch + 1))"
          echo "$NEXT" > "$VERSION_FILE"
          echo "publish_version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Upload bumped sdk-versions.txt
        uses: actions/upload-artifact@v4
        with:
          name: sdk-versions
          path: tests/fixtures/sdk-versions.txt

  publish:
    needs: setup
    name: Publish ${{ matrix.language }} SDK (${{ needs.setup.outputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Data based on Environment
        run: |
          if [ "${{ needs.setup.outputs.environment }}" == "dev" ]; then
            echo "PACKAGE_PUBLISHING_BASEURL=" >> $GITHUB_ENV
            echo "PACKAGE_PUBLISHING_API_URL=" >> $GITHUB_ENV
            echo "baseUrl=" >> $GITHUB_ENV
            echo "PACKAGE_PUBLISHING_EMAIL=" >> $GITHUB_ENV
          elif [ "${{ needs.setup.outputs.environment }}" == "prod" ]; then
            echo "PACKAGE_PUBLISHING_BASEURL=" >> $GITHUB_ENV
            echo "PACKAGE_PUBLISHING_API_URL=" >> $GITHUB_ENV
            echo "baseUrl=" >> $GITHUB_ENV
            echo "PACKAGE_PUBLISHING_EMAIL=" >> $GITHUB_ENV
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run package publishing test
        env:
          PUBLISH_LANGUAGE: ${{ matrix.language }}
          PUBLISH_VERSION: ${{ needs.setup.outputs.publish_version }}
        run: npx playwright test tests/package-publishing.test.ts

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.language }}
          path: playwright-report/
          retention-days: 7

  commit-versions:
    needs: publish
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download bumped sdk-versions.txt
        uses: actions/download-artifact@v4
        with:
          name: sdk-versions
          path: tests/fixtures

      - name: Commit updated sdk-versions.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/fixtures/sdk-versions.txt
          git diff --staged --quiet || git commit -m "chore: bump sdk version after package publishing run"
          git push
