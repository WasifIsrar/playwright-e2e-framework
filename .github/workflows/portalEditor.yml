name: Portal Editor Tests
on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: Name of the environment
        required: true
        type: choice
        options:
          - dev
          - prod
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup Data based on Environment
        run: |
          if [ "${{ github.event.inputs.environment_name }}" == "dev" ]; then
            echo "baseUrl=" >> $GITHUB_ENV
            echo "APIMATIC_API_KEY=${{ secrets.API_KEY_DEV }}" >> $GITHUB_ENV
            echo "API_BASE_URL=" >> $GITHUB_ENV
          elif [ "${{ github.event.inputs.environment_name }}" == "prod" ]; then
            echo "baseUrl=" >> $GITHUB_ENV
            echo "APIMATIC_API_KEY=${{ secrets.API_KEY_PROD }}" >> $GITHUB_ENV
            echo "API_BASE_URL=" >> $GITHUB_ENV
          fi
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests
        run: npx playwright test tests/portalEditor.test.ts
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
